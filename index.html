<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>ひとり営業 CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen bg-[#f8f8f7]">

  <header class="border-b border-gray-200 bg-white">
    <div class="mx-auto max-w-7xl px-6 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold tracking-tight">ひとり営業 CRM</h1>
      <nav class="flex gap-1">
        <button id="btn-tab-customers" class="tab-btn px-4 py-2 text-sm tab-active">顧客</button>
        <button id="btn-tab-pipeline" class="tab-btn px-4 py-2 text-sm text-gray-500">パイプライン</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-6">

    <!-- =========================================== -->
    <!-- View: 顧客 -->
    <!-- =========================================== -->
    <section id="view-customers" class="flex gap-6">

      <!-- 左ペイン: 顧客リスト -->
      <aside id="pane-customer-list" class="w-[340px] shrink-0">
        <div class="mb-3">
          <input id="input-search" type="text" placeholder="会社名・担当者・役職で検索"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:border-[#c15f3c]" />
        </div>
        <button id="btn-new-customer" class="btn-primary mb-4 w-full rounded-lg px-4 py-2 text-sm">
          + 新規顧客
        </button>
        <div id="list-customers" class="flex flex-col gap-2"></div>
      </aside>

      <!-- 右ペイン: 4モード切替 -->
      <section class="flex-1 min-w-0">

        <!-- Mode: 空状態 -->
        <div id="pane-empty" class="flex h-[480px] items-center justify-center rounded-lg border border-dashed border-gray-300 bg-white">
          <p class="text-sm text-gray-500">左から顧客を選ぶか、「新規顧客」を作成してください</p>
        </div>

        <!-- Mode: 顧客詳細 -->
        <div id="pane-detail" class="hidden rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              <h2 id="detail-company" class="truncate text-xl font-bold"></h2>
              <p class="mt-1 text-sm text-gray-600">
                <span id="detail-contact"></span><span id="detail-title" class="text-gray-500"></span>
              </p>
            </div>
            <div class="flex shrink-0 gap-2">
              <button id="btn-edit-customer"
                class="rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-sm text-gray-700 hover:border-gray-400">編集</button>
              <button id="btn-delete-customer"
                class="rounded-lg border border-red-300 bg-white px-3 py-1.5 text-sm text-red-600 hover:bg-red-50">削除</button>
            </div>
          </div>

          <dl class="mt-6 grid grid-cols-2 gap-x-6 gap-y-4 text-sm">
            <div>
              <dt class="text-xs text-gray-500">メール</dt>
              <dd id="detail-email" class="mt-0.5 break-all"></dd>
            </div>
            <div>
              <dt class="text-xs text-gray-500">電話</dt>
              <dd id="detail-phone" class="mt-0.5"></dd>
            </div>
            <div class="col-span-2">
              <dt class="text-xs text-gray-500">メモ</dt>
              <dd id="detail-memo" class="mt-0.5 whitespace-pre-wrap"></dd>
            </div>
            <div class="col-span-2">
              <dt class="text-xs text-gray-500">作成日時</dt>
              <dd id="detail-created" class="mt-0.5 text-gray-600"></dd>
            </div>
          </dl>

          <hr class="my-6 border-gray-200" />

          <div class="flex items-center justify-between">
            <h3 class="text-base font-bold">商談</h3>
            <button id="btn-add-deal" class="btn-primary rounded-lg px-3 py-1.5 text-sm">+ 商談を追加</button>
          </div>
          <div id="list-deals" class="mt-3 flex flex-col gap-2"></div>
        </div>

        <!-- Mode: 顧客フォーム -->
        <div id="pane-customer-form" class="hidden rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
          <h2 id="customer-form-title" class="text-xl font-bold">新規顧客</h2>
          <form id="form-customer" class="mt-6 flex flex-col gap-4" novalidate>
            <label class="block text-sm">
              <span class="text-gray-700">会社名 <span class="text-red-600">*</span></span>
              <input id="input-company" type="text" required
                class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
            </label>
            <label class="block text-sm">
              <span class="text-gray-700">担当者名 <span class="text-red-600">*</span></span>
              <input id="input-contact" type="text" required
                class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
            </label>
            <label class="block text-sm">
              <span class="text-gray-700">役職</span>
              <input id="input-title" type="text"
                class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
            </label>
            <div class="grid grid-cols-2 gap-4">
              <label class="block text-sm">
                <span class="text-gray-700">メール</span>
                <input id="input-email" type="email"
                  class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
              </label>
              <label class="block text-sm">
                <span class="text-gray-700">電話</span>
                <input id="input-phone" type="text"
                  class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
              </label>
            </div>
            <label class="block text-sm">
              <span class="text-gray-700">メモ</span>
              <textarea id="input-memo" rows="4"
                class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]"></textarea>
            </label>
            <div class="mt-2 flex justify-end gap-2">
              <button type="button" id="btn-cancel-customer"
                class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm text-gray-700 hover:border-gray-400">キャンセル</button>
              <button type="submit" id="btn-save-customer" class="btn-primary rounded-lg px-4 py-2 text-sm">保存</button>
            </div>
          </form>
        </div>

        <!-- Mode: 商談フォーム -->
        <div id="pane-deal-form" class="hidden rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
          <h2 id="deal-form-title" class="text-xl font-bold">新規商談</h2>
          <p id="deal-form-customer" class="mt-1 text-sm text-gray-500"></p>
          <form id="form-deal" class="mt-6 flex flex-col gap-4" novalidate>
            <label class="block text-sm">
              <span class="text-gray-700">タイトル <span class="text-red-600">*</span></span>
              <input id="input-deal-title" type="text" required
                class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
            </label>
            <div class="grid grid-cols-2 gap-4">
              <label class="block text-sm">
                <span class="text-gray-700">金額（円）</span>
                <input id="input-deal-amount" type="number" min="0" step="1" inputmode="numeric"
                  class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]" />
              </label>
              <label class="block text-sm">
                <span class="text-gray-700">ステータス <span class="text-red-600">*</span></span>
                <select id="input-deal-status"
                  class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]">
                  <option value="lead">見込み</option>
                  <option value="proposal">提案</option>
                  <option value="won">成約</option>
                </select>
              </label>
            </div>
            <label class="block text-sm">
              <span class="text-gray-700">フォローアップメモ</span>
              <textarea id="input-deal-followup" rows="4"
                class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:border-[#c15f3c]"></textarea>
            </label>
            <div class="mt-2 flex items-center justify-between gap-2">
              <button type="button" id="btn-delete-deal"
                class="hidden rounded-lg border border-red-300 bg-white px-3 py-1.5 text-sm text-red-600 hover:bg-red-50">削除</button>
              <div class="ml-auto flex gap-2">
                <button type="button" id="btn-cancel-deal"
                  class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm text-gray-700 hover:border-gray-400">キャンセル</button>
                <button type="submit" id="btn-save-deal" class="btn-primary rounded-lg px-4 py-2 text-sm">保存</button>
              </div>
            </div>
          </form>
        </div>

      </section>
    </section>

    <!-- =========================================== -->
    <!-- View: パイプライン -->
    <!-- =========================================== -->
    <section id="view-pipeline" class="hidden grid grid-cols-3 gap-4">
      <div>
        <h3 class="mb-3 flex items-center gap-2 text-sm font-bold">
          <span class="inline-block h-2 w-2 rounded-full bg-gray-400"></span>
          見込み <span id="count-lead" class="font-normal text-gray-500"></span>
        </h3>
        <div id="col-lead" class="flex min-h-[480px] flex-col gap-2 rounded-lg border border-gray-200 bg-white p-3"></div>
      </div>
      <div>
        <h3 class="mb-3 flex items-center gap-2 text-sm font-bold">
          <span class="inline-block h-2 w-2 rounded-full bg-[#c15f3c]"></span>
          提案 <span id="count-proposal" class="font-normal text-gray-500"></span>
        </h3>
        <div id="col-proposal" class="flex min-h-[480px] flex-col gap-2 rounded-lg border border-gray-200 bg-white p-3"></div>
      </div>
      <div>
        <h3 class="mb-3 flex items-center gap-2 text-sm font-bold">
          <span class="inline-block h-2 w-2 rounded-full bg-green-600"></span>
          成約 <span id="count-won" class="font-normal text-gray-500"></span>
        </h3>
        <div id="col-won" class="flex min-h-[480px] flex-col gap-2 rounded-lg border border-gray-200 bg-white p-3"></div>
      </div>
    </section>

  </main>

  <!-- =========================================== -->
  <!-- Templates -->
  <!-- =========================================== -->

  <template id="tpl-customer-card">
    <button class="customer-card w-full rounded-lg border border-gray-200 bg-white px-3 py-2.5 text-left text-sm shadow-sm hover:border-gray-300">
      <div class="customer-card-company truncate font-bold"></div>
      <div class="customer-card-sub mt-0.5 truncate text-xs text-gray-500"></div>
    </button>
  </template>

  <template id="tpl-deal-row">
    <button class="deal-row flex w-full items-center justify-between gap-2 rounded-lg border border-gray-200 bg-white px-3 py-2 text-left text-sm hover:border-gray-300">
      <div class="flex min-w-0 items-center gap-2">
        <span class="deal-row-badge shrink-0 rounded-full px-2 py-0.5 text-xs"></span>
        <span class="deal-row-title truncate"></span>
      </div>
      <span class="deal-row-amount shrink-0 text-xs text-gray-600"></span>
    </button>
  </template>

  <template id="tpl-deal-card">
    <div class="deal-card cursor-pointer rounded-lg border border-gray-200 bg-white p-3 shadow-sm hover:border-gray-300">
      <div class="deal-card-title text-sm font-bold"></div>
      <div class="deal-card-company mt-0.5 truncate text-xs text-gray-500"></div>
      <div class="mt-2 flex items-end justify-between gap-2">
        <div class="deal-card-amount text-xs text-gray-700"></div>
        <div class="flex gap-1">
          <button type="button" class="deal-card-prev rounded border border-gray-300 bg-white px-1.5 py-0.5 text-xs text-gray-600 hover:border-gray-400">←</button>
          <button type="button" class="deal-card-next rounded border border-gray-300 bg-white px-1.5 py-0.5 text-xs text-gray-600 hover:border-gray-400">→</button>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
